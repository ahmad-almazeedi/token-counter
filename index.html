<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Token Counter</title>
  <meta name="description" content="A minimal canvas to paste text and instantly see its character count. Token counts and model pricing coming soon." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔢</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <!-- Set theme before first paint to avoid a flash of the wrong mode -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch color theme">
    <span class="theme-toggle__icon" aria-hidden="true"></span>
  </button>

  <main class="app">
    <section class="counter" aria-live="polite">
      <div class="counter__value" id="charCount">0</div>
      <div class="counter__label">characters</div>
    </section>

    <div class="box">
      <textarea
        id="input"
        class="input"
        aria-label="Text to count"
        placeholder="Type here"
        spellcheck="false"
        autocomplete="off"
        autocapitalize="off"
      ></textarea>

      <div id="pasteZone" class="paste-zone" role="button" tabindex="0" aria-label="Paste from clipboard">
        <span class="paste-zone__hint">
          <svg class="paste-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="8" y="3" width="8" height="4" rx="1.5"></rect>
            <path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"></path>
          </svg>
          <span>Paste</span>
        </span>
      </div>

      <button id="clearBtn" class="clear-btn clear-btn--hidden" type="button" aria-label="Clear text">
        <svg class="clear-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"></path>
        </svg>
        <span>Clear</span>
      </button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
